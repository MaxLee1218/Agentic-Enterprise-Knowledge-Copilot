name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Python 3.11 quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --disable-pip-version-check -e ".[dev]"

      - name: Run Ruff lint checks
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run Mypy
        run: mypy

      - name: Run test suite
        run: pytest

      - name: Run offline evaluation smoke test
        run: >-
          python evaluation/run_eval.py --smoke
          --output "${RUNNER_TEMP}/evaluation-smoke-report.json"

      - name: Check documentation governance
        run: python scripts/check_docs.py

      - name: Check architecture dependencies
        run: python scripts/check_architecture.py

      - name: Verify editable install and distribution build
        run: |
          python -m pip install --disable-pip-version-check --no-deps -e .
          python -m build
          python -m pip install --disable-pip-version-check --no-deps --force-reinstall dist/*.whl
          python -c "import copilot; print(copilot.__version__)"
